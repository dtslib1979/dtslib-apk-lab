<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0D0D0D">
    <title>DTSLIB APK Lab</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0D0D0D;
            --bg-card: #1A1A1A;
            --bg-card-hover: #222;
            --surface: #253A2F;
            --surface-alt: #1a2e23;
            --accent: #D4AF37;
            --accent-glow: rgba(212,175,55,0.4);
            --border: rgba(212,175,55,0.15);
            --border-hover: rgba(212,175,55,0.35);
            --text: #F5F5DC;
            --text-secondary: rgba(245,245,220,0.6);
            --text-muted: rgba(245,245,220,0.3);
            --green: #4CAF50;
            --red: #FF5252;
            --yellow: #FFC107;
            --blue: #2196F3;
            --grid-cols: 3;
            --max-width: 540px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: var(--max-width); margin: 0 auto; padding: 16px; }

        /* ── Header ── */
        header { text-align: center; padding: 40px 0 20px; }

        .brand-mark {
            width: 64px; height: 64px; margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-alt) 100%);
            border: 1px solid var(--border); border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700;
            color: var(--accent); letter-spacing: 0.05em;
        }

        .brand-title {
            font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700;
            letter-spacing: 0.08em; color: var(--text); margin-bottom: 4px;
        }
        .brand-title span { color: var(--accent); }

        .brand-sub {
            font-size: 12px; color: var(--text-muted);
            letter-spacing: 0.15em; text-transform: uppercase;
        }

        /* ── Stats Bar ── */
        .stats-bar {
            display: flex; justify-content: center; gap: 8px;
            flex-wrap: wrap; margin: 16px 0;
        }
        .stat-pill {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 12px;
            background: color-mix(in srgb, var(--accent) 8%, transparent);
            border: 1px solid var(--border); border-radius: 100px;
            font-size: 11px; color: var(--text-secondary); letter-spacing: 0.03em;
        }
        .stat-pill .sv { color: var(--accent); font-weight: 600; }

        /* ── Connect / Factory Bar ── */
        .factory-bar {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; padding: 10px 14px; margin-bottom: 16px;
            background: color-mix(in srgb, var(--accent) 6%, transparent);
            border: 1px solid var(--border); border-radius: 10px;
            font-size: 11px;
        }
        .factory-bar.disconnected { color: var(--yellow); }
        .factory-bar.connected { color: var(--green); }

        .fb-btn {
            padding: 4px 14px; border-radius: 100px; border: 1px solid;
            background: transparent; font-family: 'Inter', sans-serif;
            font-size: 11px; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }
        .fb-btn.primary {
            border-color: var(--accent); color: var(--accent);
        }
        .fb-btn.primary:hover {
            background: var(--accent); color: var(--bg);
        }
        .fb-btn.subtle {
            border-color: var(--border); color: var(--text-muted);
        }
        .fb-btn.subtle:hover {
            border-color: var(--border-hover); color: var(--text-secondary);
        }

        /* ── Warning ── */
        .warning {
            background: color-mix(in srgb, var(--accent) 8%, transparent);
            border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 14px; margin-bottom: 16px;
            color: var(--accent); font-size: 11px;
            text-align: center; letter-spacing: 0.02em;
        }

        /* ── Category Filter ── */
        .category-filter {
            display: flex; gap: 6px; flex-wrap: wrap;
            justify-content: center; margin-bottom: 16px;
        }
        .filter-pill {
            padding: 5px 14px; border-radius: 100px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-secondary); font-family: 'Inter', sans-serif;
            font-size: 11px; font-weight: 500; cursor: pointer;
            transition: all 0.2s; letter-spacing: 0.03em;
        }
        .filter-pill:hover { border-color: var(--border-hover); color: var(--text); }
        .filter-pill.active {
            background: var(--accent); border-color: var(--accent);
            color: var(--bg); font-weight: 600;
        }

        /* ── Section Headers ── */
        .section-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
        }
        .section-label {
            font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            white-space: nowrap; color: var(--accent);
        }
        .section-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
        .section-count { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

        /* ── App Grid ── */
        .app-grid {
            display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); gap: 12px;
        }

        .app-card {
            position: relative; overflow: hidden;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 14px 8px 10px;
            text-align: center; text-decoration: none; color: inherit;
            transition: all 0.3s ease; opacity: 0; transform: translateY(16px);
        }
        .app-card.revealed { opacity: 1; transform: translateY(0); }
        .app-card:hover { background: var(--bg-card-hover); border-color: var(--border-hover); }
        .app-card.dev { opacity: 0.5; }
        .app-card.dev.revealed { opacity: 0.5; }
        .app-card.hidden { display: none; }

        .app-card::after {
            content: ''; position: absolute; inset: 0; border-radius: 16px;
            background: linear-gradient(90deg, transparent 0%,
                color-mix(in srgb, var(--accent) 5%, transparent) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: cardShimmer 3s ease-in-out infinite; pointer-events: none;
        }
        @keyframes cardShimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .app-icon {
            font-size: 28px; width: 48px; height: 48px; margin: 0 auto 8px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(145deg, var(--surface), var(--surface-alt));
            border: 1px solid var(--border); border-radius: 12px;
        }
        .app-name {
            font-size: 11px; font-weight: 600; margin-bottom: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .app-version { font-size: 10px; color: var(--accent); letter-spacing: 0.03em; }

        .cat-badge {
            display: inline-block; margin-top: 4px; padding: 1px 7px;
            border-radius: 100px; font-size: 8px; font-weight: 600;
            letter-spacing: 0.05em; text-transform: uppercase; border: 1px solid;
        }

        /* ── Build Status ── */
        .build-status {
            font-size: 9px; margin-top: 6px; font-weight: 500;
            letter-spacing: 0.03em;
        }
        .bs-success { color: var(--green); }
        .bs-building { color: var(--yellow); }
        .bs-queued { color: var(--blue); }
        .bs-fail { color: var(--red); }
        .bs-none { color: var(--text-muted); }

        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .bs-building, .bs-queued { animation: pulse 1.5s ease-in-out infinite; }

        /* ── Card Actions ── */
        .card-actions {
            display: flex; gap: 6px; justify-content: center; margin-top: 8px;
        }
        .act-btn {
            flex: 1; max-width: 60px; height: 30px; border-radius: 8px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-secondary); font-size: 13px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; text-decoration: none;
        }
        .act-btn:hover { border-color: var(--border-hover); }
        .act-btn.build:hover { color: var(--yellow); border-color: var(--yellow); }
        .act-btn.download:hover { color: var(--green); border-color: var(--green); }
        .act-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ── Timeline ── */
        .timeline { margin-top: 24px; }
        .timeline-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid color-mix(in srgb, var(--accent) 8%, transparent);
        }
        .timeline-item:last-child { border-bottom: none; }
        .timeline-icon {
            font-size: 18px; width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; flex-shrink: 0;
        }
        .timeline-info { flex: 1; min-width: 0; }
        .timeline-name { font-size: 12px; font-weight: 600; }
        .timeline-desc {
            font-size: 10px; color: var(--text-muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .timeline-date { font-size: 10px; color: var(--text-muted); white-space: nowrap; }

        /* ── Pipeline (Interactive) ── */
        .pipeline-section { margin-bottom: 20px; }

        .pipe-input-row {
            display: flex; gap: 8px; margin-bottom: 12px;
        }
        .pipe-input-row input {
            flex: 1; padding: 10px 12px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-family: 'Inter', sans-serif; font-size: 12px;
            outline: none;
        }
        .pipe-input-row input:focus { border-color: var(--accent); }
        .pipe-input-row input::placeholder { color: var(--text-muted); }
        .pipe-input-row button {
            padding: 10px 18px; border-radius: 8px; border: 1px solid var(--accent);
            background: var(--accent); color: var(--bg);
            font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
            cursor: pointer; white-space: nowrap; transition: opacity 0.2s;
        }
        .pipe-input-row button:hover { opacity: 0.85; }
        .pipe-input-row button:disabled { opacity: 0.4; cursor: not-allowed; }

        .pipe-stages { display: flex; flex-direction: column; gap: 0; }

        .pipe-step {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-left: 2px solid var(--border);
            margin-left: 9px; position: relative; transition: all 0.3s;
        }
        .pipe-step.active { border-left-color: var(--accent); }
        .pipe-step.done { border-left-color: var(--green); }
        .pipe-step.fail { border-left-color: var(--red); }

        .pipe-dot {
            width: 20px; height: 20px; border-radius: 50%;
            border: 2px solid var(--border); background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; flex-shrink: 0;
            position: absolute; left: -11px;
        }
        .pipe-step.active .pipe-dot { border-color: var(--accent); background: var(--accent); color: var(--bg); }
        .pipe-step.done .pipe-dot { border-color: var(--green); background: var(--green); color: #fff; }
        .pipe-step.fail .pipe-dot { border-color: var(--red); background: var(--red); color: #fff; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .pipe-step.active .pipe-dot::after {
            content: ''; position: absolute; inset: -4px;
            border: 2px solid transparent; border-top-color: var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite;
        }

        .pipe-info { flex: 1; min-width: 0; padding-left: 16px; }
        .pipe-label {
            font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
        }
        .pipe-detail {
            font-size: 10px; color: var(--text-muted); margin-top: 1px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .pipe-step.done .pipe-detail { color: var(--green); }
        .pipe-step.fail .pipe-detail { color: var(--red); }

        .pipe-badge {
            font-size: 9px; font-weight: 600; padding: 2px 8px;
            border-radius: 100px; flex-shrink: 0; letter-spacing: 0.04em;
        }
        .pipe-badge.idle { background: color-mix(in srgb, var(--accent) 10%, transparent); color: var(--text-muted); }
        .pipe-badge.running { background: color-mix(in srgb, var(--accent) 20%, transparent); color: var(--accent); }
        .pipe-badge.ok { background: color-mix(in srgb, var(--green) 15%, transparent); color: var(--green); }
        .pipe-badge.err { background: color-mix(in srgb, var(--red) 15%, transparent); color: var(--red); }

        .pipe-output {
            margin-top: 8px; padding: 10px 12px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 10px; color: var(--text-muted); font-family: monospace;
            line-height: 1.7; max-height: 140px; overflow-y: auto;
            display: none;
        }
        .pipe-output.show { display: block; }
        .pipe-output .ok { color: var(--green); }
        .pipe-output .err { color: var(--red); }
        .pipe-output .warn { color: var(--yellow); }

        /* ── Divider + Footer ── */
        .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 24px 0; }
        footer { text-align: center; padding: 16px 0 40px; }
        footer p { font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; }
        footer a { color: var(--accent); text-decoration: none; }
        .footer-brand { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.2em; color: var(--text-muted); margin-top: 8px; }

        /* ── Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.7);
            align-items: center; justify-content: center; padding: 16px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #1a1a1a; border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; width: 100%;
            max-width: 400px; max-height: 90vh; overflow-y: auto;
        }
        .modal-box h3 {
            font-family: 'Cinzel', serif; font-size: 16px; color: var(--accent);
            margin-bottom: 16px; letter-spacing: 0.05em;
        }
        .modal-box label {
            display: block; font-size: 11px; color: var(--text-secondary);
            margin-bottom: 4px; letter-spacing: 0.05em;
        }
        .modal-box input, .modal-box select, .modal-box textarea {
            width: 100%; padding: 10px 12px; margin-bottom: 12px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text);
            font-family: 'Inter', sans-serif; font-size: 13px;
            outline: none;
        }
        .modal-box input:focus, .modal-box select:focus, .modal-box textarea:focus {
            border-color: var(--accent);
        }
        .modal-box textarea { resize: vertical; min-height: 60px; }
        .modal-actions { display: flex; gap: 8px; margin-top: 8px; }
        .modal-actions button {
            flex: 1; padding: 10px; border-radius: 8px; border: 1px solid;
            font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .modal-actions .m-primary {
            background: var(--accent); border-color: var(--accent); color: var(--bg);
        }
        .modal-actions .m-primary:hover { opacity: 0.9; }
        .modal-actions .m-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .modal-actions .m-cancel {
            background: transparent; border-color: var(--border); color: var(--text-secondary);
        }
        .modal-actions .m-cancel:hover { border-color: var(--border-hover); }

        .progress-log {
            font-size: 11px; color: var(--text-muted); margin-top: 8px;
            line-height: 1.8; font-family: monospace;
        }
        .progress-log .ok { color: var(--green); }
        .progress-log .err { color: var(--red); }
        .progress-log .wait { color: var(--yellow); }

        /* ── Responsive ── */
        @media (max-width: 380px) {
            .app-grid { grid-template-columns: repeat(2, 1fr); }
            .stats-bar { gap: 6px; }
            .stat-pill { padding: 4px 10px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header id="header"></header>
        <div id="statsBar"></div>
        <div id="pipelineSection"></div>
        <div id="factoryBar"></div>
        <div id="warningBar"></div>
        <div id="categoryFilter"></div>
        <div id="appSection"></div>
        <div id="timelineSection"></div>
        <div class="divider"></div>
        <div style="text-align:center;padding:24px 0 8px;">
          <a href="/targeting.html" style="display:inline-flex;align-items:center;gap:10px;padding:12px 24px;border-radius:12px;border:1px solid rgba(212,175,55,0.25);background:rgba(212,175,55,0.06);color:#D4AF37;text-decoration:none;font-size:13px;font-weight:600;letter-spacing:0.5px;" onmouseover="this.style.background='rgba(212,175,55,0.12)'" onmouseout="this.style.background='rgba(212,175,55,0.06)'">
            <span style="font-size:18px">🎯</span>
            <span>타겟팅 프로그램 26 — 인터랙티브 노드맵</span>
            <span style="opacity:0.5;font-size:11px">PC전용 × Android공백</span>
          </a>
        </div>
        <footer id="footer"></footer>
    </div>

    <!-- Token Modal -->
    <div class="modal-overlay" id="tokenModal">
        <div class="modal-box">
            <h3>GitHub Connect</h3>
            <label>Personal Access Token (repo + workflow scope)</label>
            <input type="password" id="tokenInput" placeholder="ghp_..." />
            <div class="modal-actions">
                <button class="m-primary" onclick="F.saveToken()">Connect</button>
                <button class="m-cancel" onclick="F.closeModal('tokenModal')">Cancel</button>
            </div>
            <div id="tokenStatus" class="progress-log"></div>
        </div>
    </div>

    <!-- New App Modal -->
    <div class="modal-overlay" id="newAppModal">
        <div class="modal-box">
            <h3>New App</h3>
            <label>App Name</label>
            <input type="text" id="naName" placeholder="Parksy Something" />
            <label>Category</label>
            <select id="naCategory"></select>
            <label>Description</label>
            <input type="text" id="naDesc" placeholder="What does it do" />
            <label>Icon Emoji</label>
            <input type="text" id="naEmoji" placeholder="📱" maxlength="4" />
            <div class="modal-actions">
                <button class="m-primary" id="naSubmit" onclick="F.createApp()">Create & Build</button>
                <button class="m-cancel" onclick="F.closeModal('newAppModal')">Cancel</button>
            </div>
            <div id="createProgress" class="progress-log"></div>
        </div>
    </div>

    <script>
    var F = (function() {
        var config, apps;
        var GH = {};
        var TK = 'dtslab_gh_token';
        var polls = {};

        // ── Init ──
        Promise.all([
            fetch('dashboard-config.json').then(function(r) {
                if (!r.ok) throw new Error('config: ' + r.status);
                return r.json();
            }),
            fetch('apps.json').then(function(r) {
                if (!r.ok) throw new Error('apps: ' + r.status);
                return r.json();
            })
        ]).then(function(res) {
            config = res[0]; apps = res[1];
            GH = config.github || {};
            applyTheme(config.theme);
            applyLayout(config.layout);
            renderHeader(config.brand);
            document.title = config.brand.name + ' ' + config.brand.highlight;
            if (config.sections.stats) renderStats(config.stats);
            if (config.sections.pipeline && config.pipeline) renderPipeline(config.pipeline);
            renderFactoryBar();
            if (config.sections.warning) renderWarning(config.sections.warningText);
            if (config.sections.categoryFilter) renderCategoryFilter(config.categories);
            renderApps(apps, config.categories);
            if (config.sections.timeline) renderTimeline(apps);
            renderFooter(config.brand);
            revealCards();
            loadStatuses();
        }).catch(function(err) {
            document.querySelector('.container').innerHTML =
                '<div style="text-align:center;padding:80px 20px;color:var(--red);font-size:14px;">' +
                '<p>Failed to load dashboard</p>' +
                '<p style="color:#666;font-size:11px;margin-top:8px;">' + err.message + '</p></div>';
        });

        // ── Token ──
        function gt() { return localStorage.getItem(TK); }
        function ht() { return !!gt(); }

        // ── GitHub API ──
        function api(method, path, body) {
            var h = { 'Accept': 'application/vnd.github.v3+json' };
            if (gt()) h['Authorization'] = 'Bearer ' + gt();
            if (body) h['Content-Type'] = 'application/json';
            return fetch('https://api.github.com' + path, {
                method: method, headers: h,
                body: body ? JSON.stringify(body) : undefined
            }).then(function(r) {
                if (r.status === 204) return null;
                return r.json().then(function(d) {
                    if (!r.ok) throw new Error(d.message || r.status);
                    return d;
                });
            });
        }

        function gp(p) { return '/repos/' + GH.owner + '/' + GH.repo + p; }

        // ── Theme ──
        function applyTheme(t) {
            var s = document.documentElement.style;
            var map = {bg:'bg',bgCard:'bg-card',bgCardHover:'bg-card-hover',surface:'surface',
                surfaceAlt:'surface-alt',accent:'accent',accentGlow:'accent-glow',
                border:'border',borderHover:'border-hover',text:'text',
                textSecondary:'text-secondary',textMuted:'text-muted'};
            Object.keys(map).forEach(function(k) { if (t[k]) s.setProperty('--'+map[k], t[k]); });
            document.querySelector('meta[name="theme-color"]').content = t.bg;
        }

        function applyLayout(l) {
            var s = document.documentElement.style;
            s.setProperty('--max-width', l.maxWidth);
            s.setProperty('--grid-cols', l.gridColumns);
        }

        // ── Render ──

        // ── Pipeline State ──

        function pipeSetStage(num, state, detail) {

        // ── Pipeline Execution ──
        function startPipeline() {
            if (pipeState.running || !ht()) return;
            var input = document.getElementById('pipeUrl').value.trim();
            if (!input) return;

            pipeState.running = true;
            pipeState.current = 0;
            document.getElementById('pipeStart').disabled = true;
            document.getElementById('pipeLog').innerHTML = '';
            document.getElementById('pipeLog').classList.add('show');

            // Parse input: extract name
            var name = input.replace(/.*\//, '').replace(/\.git$/, '').replace(/[^a-zA-Z0-9_-]/g, '');
            if (!name) name = 'new-app';
            var appName = 'Parksy ' + name.charAt(0).toUpperCase() + name.slice(1).replace(/-/g, ' ');
            var appId = name.toLowerCase().replace(/\s+/g, '-');
            var projName = appId.replace(/-/g, '_');
            var pkg = 'kr.parksy.' + projName;
            var tag = appId + '-latest';
            var wfFile = 'build-' + appId + '.yml';

            pipeState.appName = appName;
            pipeState.appId = appId;
            pipeState.wfFile = wfFile;

            pipeLog('Pipeline started: ' + input, 'warn');
            pipeLog('Target: ' + appName + ' (' + pkg + ')', '');

            // Stage 1: Ingestion — 소스 확인 + 레지스트리 등록
            runStage1(input, appId, appName, pkg, tag, wfFile, projName);
        }

        function runStage1(input, appId, appName, pkg, tag, wfFile, projName) {
            pipeSetStage(1, 'active', 'Reading registry...');
            pipeLog('S1: Reading app-registry.json...', '');

            api('GET', gp('/contents/app-registry.json'))
            .then(function(file) {
                var content = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
                var registry = JSON.parse(content);

                // Check duplicate
                var exists = registry.some(function(r) { return r.id === appId; });
                if (exists) {
                    pipeLog('S1: App "' + appId + '" already registered — skipping to build', 'warn');
                    pipeSetStage(1, 'done', 'Already registered');
                    pipeSetStage(2, 'done', 'Skipped (existing)');
                    pipeSetStage(3, 'done', 'Skipped (existing)');
                    runStage4(wfFile);
                    return;
                }

                registry.push({
                    id: appId, name: appName, package: pkg,
                    directory: 'apps/' + appId,
                    version: '1.0.0', version_code: 1,
                    status: 'store-registered', category: 'utility',
                    overlay: false, description: 'Forked from ' + input,
                    icon_emoji: '📱', release_tag: tag,
                    workflow: wfFile, source_origin: 'forked:' + input,
                    theme_strategy: 'material3_seeded',
                    compile_sdk: 35, min_sdk: 26, target_sdk: 34,
                    java_version: '17', dart_lines: 0, kotlin_lines: 0
                });

                var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(registry, null, 2) + '\n')));
                pipeLog('S1: Registering ' + appName + '...', '');

                return api('PUT', gp('/contents/app-registry.json'), {
                    message: 'pipeline(s1): ingest ' + appName + ' from ' + input,
                    content: encoded, sha: file.sha
                });
            })
            .then(function(res) {
                if (!res) return; // skipped
                pipeSetStage(1, 'done', 'Registered in app-registry.json');
                pipeLog('S1: ✓ Ingestion complete', 'ok');
                runStage2(appId, appName, input);
            })
            .catch(function(err) {
                pipeSetStage(1, 'fail', err.message);
                pipeLog('S1: ✗ ' + err.message, 'err');
                pipeFinish(false);
            });
        }

        function runStage2(appId, appName, sourceUrl) {
            pipeSetStage(2, 'active', 'Analyzing source...');
            pipeLog('S2: Analyzing build config for ' + appId + '...', '');

            // Stage 2: Analysis — For browser-side, we create analysis metadata
            var analysis = {
                schema_version: 'analysis-v1',
                source: sourceUrl,
                target_package: 'kr.parksy.' + appId.replace(/-/g, '_'),
                analyzed_at: new Date().toISOString(),
                build_config: { compile_sdk: 35, min_sdk: 26, target_sdk: 34, agp: '8.2.0', java: '17' },
                constitution_check: 'pending',
                license_gate: 'pending'
            };

            var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(analysis, null, 2) + '\n')));
            pipeLog('S2: Creating analysis report...', '');

            api('PUT', gp('/contents/apps/' + appId + '/analysis-report.json'), {
                message: 'pipeline(s2): analysis for ' + appName,
                content: encoded
            })
            .then(function() {
                pipeSetStage(2, 'done', 'Analysis report created');
                pipeLog('S2: ✓ Analysis complete', 'ok');
                runStage3(appId, appName, sourceUrl);
            })
            .catch(function(err) {
                pipeSetStage(2, 'fail', err.message);
                pipeLog('S2: ✗ ' + err.message, 'err');
                pipeFinish(false);
            });
        }

        function runStage3(appId, appName, sourceUrl) {
            pipeSetStage(3, 'active', 'Scaffolding Flutter app...');
            pipeLog('S3: Creating pubspec.yaml...', '');

            var projName = appId.replace(/-/g, '_');
            var pkg = 'kr.parksy.' + projName;
            var tag = appId + '-latest';
            var wfFile = 'build-' + appId + '.yml';

            // 3a: pubspec.yaml
            var pubspec = 'name: ' + projName + '\n' +
                'description: ' + appName + ' (forked from ' + sourceUrl + ')\n' +
                'version: 1.0.0+1\n' +
                "publish_to: 'none'\n\n" +
                'environment:\n' +
                "  sdk: '>=3.0.0 <4.0.0'\n\n" +
                'dependencies:\n' +
                '  flutter:\n' +
                '    sdk: flutter\n\n' +
                'dev_dependencies:\n' +
                '  flutter_test:\n' +
                '    sdk: flutter\n' +
                '  flutter_lints: ^5.0.0\n';

            var encPub = btoa(unescape(encodeURIComponent(pubspec)));

            api('PUT', gp('/contents/apps/' + appId + '/pubspec.yaml'), {
                message: 'pipeline(s3): scaffold ' + appName + ' pubspec',
                content: encPub
            })
            .then(function() {
                pipeLog('S3: ✓ pubspec.yaml', 'ok');
                pipeLog('S3: Creating main.dart...', '');

                // 3b: main.dart
                var mainDart = "import 'package:flutter/material.dart';\n\n" +
                    'void main() => runApp(const MyApp());\n\n' +
                    'class MyApp extends StatelessWidget {\n' +
                    '  const MyApp({super.key});\n' +
                    '  @override\n' +
                    '  Widget build(BuildContext context) {\n' +
                    '    return MaterialApp(\n' +
                    "      title: '" + appName + "',\n" +
                    '      theme: ThemeData(\n' +
                    '        colorSchemeSeed: const Color(0xFFD4AF37),\n' +
                    '        brightness: Brightness.dark,\n' +
                    '        useMaterial3: true,\n' +
                    '      ),\n' +
                    '      home: Scaffold(\n' +
                    "        appBar: AppBar(title: const Text('" + appName + "')),\n" +
                    "        body: const Center(child: Text('Ready for customization',\n" +
                    '            style: TextStyle(fontSize: 18))),\n' +
                    '      ),\n' +
                    '    );\n' +
                    '  }\n' +
                    '}\n';

                var encMain = btoa(unescape(encodeURIComponent(mainDart)));
                return api('PUT', gp('/contents/apps/' + appId + '/lib/main.dart'), {
                    message: 'pipeline(s3): scaffold ' + appName + ' main.dart',
                    content: encMain
                });
            })
            .then(function() {
                pipeLog('S3: ✓ main.dart', 'ok');
                pipeLog('S3: Creating CI workflow...', '');

                // 3c: Workflow
                var org = pkg.split('.').slice(0, -1).join('.');
                var wfYaml = generateWorkflow(appName, appId, projName, pkg, tag, '📱');
                var encWf = btoa(unescape(encodeURIComponent(wfYaml)));
                return api('PUT', gp('/contents/.github/workflows/' + wfFile), {
                    message: 'pipeline(s3): CI workflow for ' + appName,
                    content: encWf
                });
            })
            .then(function() {
                pipeLog('S3: ✓ Workflow ' + wfFile, 'ok');
                pipeSetStage(3, 'done', 'App scaffolded + CI created');
                pipeLog('S3: ✓ Transform complete', 'ok');
                runStage4(wfFile);
            })
            .catch(function(err) {
                pipeSetStage(3, 'fail', err.message);
                pipeLog('S3: ✗ ' + err.message, 'err');
                pipeFinish(false);
            });
        }

        function runStage4(wfFile) {
            pipeSetStage(4, 'active', 'Triggering GitHub Actions...');
            pipeLog('S4: Dispatching ' + wfFile + '...', '');

            api('POST', gp('/actions/workflows/' + wfFile + '/dispatches'), { ref: GH.branch })
            .then(function() {
                pipeLog('S4: Build triggered — polling status...', 'warn');
                pipeSetStage(4, 'active', 'Building... (8-15 min)');
                pollBuildStage(wfFile, 0);
            })
            .catch(function(err) {
                pipeSetStage(4, 'fail', err.message);
                pipeLog('S4: ✗ ' + err.message, 'err');
                pipeFinish(false);
            });
        }

        function pollBuildStage(wfFile, attempts) {
            if (attempts > 80) { // ~16 min max
                pipeSetStage(4, 'fail', 'Timeout');
                pipeLog('S4: ✗ Build timeout', 'err');
                pipeFinish(false);
                return;
            }
            setTimeout(function() {
                api('GET', gp('/actions/workflows/' + wfFile + '/runs?per_page=1'))
                .then(function(d) {
                    if (!d || !d.workflow_runs || !d.workflow_runs.length) {
                        pollBuildStage(wfFile, attempts + 1);
                        return;
                    }
                    var run = d.workflow_runs[0];
                    if (run.status === 'completed') {
                        if (run.conclusion === 'success') {
                            pipeSetStage(4, 'done', 'Build success');
                            pipeLog('S4: ✓ APK built', 'ok');
                            runStage5();
                        } else {
                            pipeSetStage(4, 'fail', run.conclusion);
                            pipeLog('S4: ✗ Build ' + run.conclusion, 'err');
                            pipeFinish(false);
                        }
                    } else {
                        var msg = run.status === 'queued' ? 'Queued...' : 'Building...';
                        pipeSetStage(4, 'active', msg);
                        pollBuildStage(wfFile, attempts + 1);
                    }
                })
                .catch(function() { pollBuildStage(wfFile, attempts + 1); });
            }, 12000);
        }

        function runStage5() {
            pipeSetStage(5, 'active', 'Updating store...');
            pipeLog('S5: Triggering store index rebuild...', '');

            // Trigger publish-store-index workflow
            api('POST', gp('/actions/workflows/publish-store-index.yml/dispatches'), { ref: GH.branch })
            .then(function() {
                pipeSetStage(5, 'done', 'Store update triggered');
                pipeLog('S5: ✓ Distribution triggered', 'ok');
                var dlUrl = 'https://github.com/' + GH.owner + '/' + GH.repo + '/releases/download/' + pipeState.appId + '-latest/app-debug.apk';
                pipeLog('📦 APK: ' + dlUrl, 'ok');
                pipeFinish(true);
            })
            .catch(function(err) {
                // Even if store index trigger fails, build succeeded
                pipeSetStage(5, 'done', 'Build done (store manual)');
                pipeLog('S5: Store trigger skipped — ' + err.message, 'warn');
                pipeFinish(true);
            });
        }

        function pipeFinish(success) {
            pipeState.running = false;
            document.getElementById('pipeStart').disabled = false;
            if (success) {
                pipeLog('━━━ Pipeline complete ✓ ━━━', 'ok');
            } else {
                pipeLog('━━━ Pipeline stopped ✗ ━━━', 'err');
            }
        }

        function revealCards() {
            var obs = new IntersectionObserver(function(entries) {
                entries.forEach(function(e) {
                    if (e.isIntersecting) { e.target.classList.add('revealed'); obs.unobserve(e.target); }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.app-card').forEach(function(el, i) {
                el.style.transitionDelay = (i * 0.06) + 's';
                obs.observe(el);
            });
        }

        // ── Build Operations ──
        function triggerBuild(wf, btnEl) {
            if (!ht()) { openModal('tokenModal'); return; }
            var card = btnEl.closest('.app-card');
            btnEl.disabled = true;
            btnEl.innerHTML = '&#8987;';
            setStatus(card, 'queued', 'Queued...');

            api('POST', gp('/actions/workflows/' + wf + '/dispatches'), { ref: GH.branch })
            .then(function() {
                setStatus(card, 'building', 'Triggered');
                startPoll(wf, card, btnEl);
            })
            .catch(function(err) {
                setStatus(card, 'fail', err.message.substring(0, 20));
                btnEl.disabled = false;
                btnEl.innerHTML = '&#9654;';
            });
        }

        function setStatus(card, type, txt) {
            var el = card.querySelector('.build-status');
            el.className = 'build-status bs-' + type;
            el.textContent = txt;
        }

        function startPoll(wf, card, btnEl) {
            if (polls[wf]) clearInterval(polls[wf]);
            polls[wf] = setInterval(function() {
                api('GET', gp('/actions/workflows/' + wf + '/runs?per_page=1'))
                .then(function(d) {
                    if (!d || !d.workflow_runs || !d.workflow_runs.length) return;
                    var run = d.workflow_runs[0];
                    if (run.status === 'completed') {
                        clearInterval(polls[wf]); delete polls[wf];
                        btnEl.disabled = false; btnEl.innerHTML = '&#9654;';
                        if (run.conclusion === 'success') {
                            setStatus(card, 'success', 'Built &#10003;');
                        } else {
                            setStatus(card, 'fail', run.conclusion);
                        }
                    } else {
                        setStatus(card, 'building', run.status === 'queued' ? 'Queued...' : 'Building...');
                    }
                }).catch(function() {});
            }, 12000);
        }

        function loadStatuses() {
            if (!ht()) return;
            apps.forEach(function(app) {
                if (!app.workflow) return;
                var card = document.getElementById('card-' + app.id);
                if (!card) return;
                api('GET', gp('/actions/workflows/' + app.workflow + '/runs?per_page=1'))
                .then(function(d) {
                    if (!d || !d.workflow_runs || !d.workflow_runs.length) {
                        setStatus(card, 'none', 'No builds');
                        return;
                    }
                    var run = d.workflow_runs[0];
                    if (run.status === 'completed') {
                        setStatus(card, run.conclusion === 'success' ? 'success' : 'fail',
                            run.conclusion === 'success' ? 'Built &#10003;' : run.conclusion);
                    } else {
                        setStatus(card, 'building', run.status);
                        var btn = card.querySelector('.act-btn.build');
                        if (btn) startPoll(app.workflow, card, btn);
                    }
                }).catch(function() {
                    setStatus(card, 'none', '-');
                });
            });
        }

        function buildAll() {
            if (!ht()) { openModal('tokenModal'); return; }
            document.querySelectorAll('.act-btn.build:not(:disabled)').forEach(function(btn) {
                btn.click();
            });
        }

        // ── New App Creation ──
        function createApp() {
            var name = document.getElementById('naName').value.trim();
            var cat = document.getElementById('naCategory').value;
            var desc = document.getElementById('naDesc').value.trim();
            var emoji = document.getElementById('naEmoji').value.trim() || '\uD83D\uDCF1';
            if (!name) return;

            var id = name.toLowerCase().replace(/^parksy\s+/i, '').replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
            var projName = id.replace(/-/g, '_');
            var pkg = 'kr.parksy.' + projName;
            var tag = id + '-latest';
            var wfFile = 'build-' + id + '.yml';
            var log = document.getElementById('createProgress');
            var btn = document.getElementById('naSubmit');
            btn.disabled = true;
            log.innerHTML = '<span class="wait">&#9679; Reading registry...</span>';

            // Step 1: Read registry
            api('GET', gp('/contents/app-registry.json'))
            .then(function(file) {
                var content = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
                var registry = JSON.parse(content);

                // Add new entry
                registry.push({
                    id: id, name: name, package: pkg,
                    directory: 'apps/' + id,
                    version: '1.0.0', version_code: 1,
                    status: 'store-registered', category: cat,
                    overlay: false, description: desc,
                    icon_emoji: emoji, release_tag: tag,
                    workflow: wfFile, source_origin: 'original',
                    theme_strategy: 'material3_seeded',
                    color_file: null, constants_path: null, home_screen_path: null,
                    compile_sdk: 35, min_sdk: 26, target_sdk: 34,
                    java_version: '17', dart_lines: 0, kotlin_lines: 0
                });

                var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(registry, null, 2) + '\n')));
                log.innerHTML += '<br><span class="ok">&#10003; Registry read</span><br><span class="wait">&#9679; Committing registry...</span>';

                return api('PUT', gp('/contents/app-registry.json'), {
                    message: 'feat: register ' + name,
                    content: encoded, sha: file.sha
                });
            })
            .then(function() {
                log.innerHTML += '<br><span class="ok">&#10003; Registry updated</span><br><span class="wait">&#9679; Creating CI workflow...</span>';

                // Step 2: Create workflow file
                var wfYaml = generateWorkflow(name, id, projName, pkg, tag, emoji);
                var encoded = btoa(unescape(encodeURIComponent(wfYaml)));

                return api('PUT', gp('/contents/.github/workflows/' + wfFile), {
                    message: 'feat: add CI for ' + name,
                    content: encoded
                });
            })
            .then(function() {
                log.innerHTML += '<br><span class="ok">&#10003; Workflow created</span><br><span class="wait">&#9679; Scaffolding app...</span>';

                // Step 3: Create minimal pubspec.yaml
                var pubspec = 'name: ' + projName + '\n' +
                    'description: ' + desc + '\n' +
                    'version: 1.0.0+1\n' +
                    "publish_to: 'none'\n\n" +
                    'environment:\n' +
                    "  sdk: '>=3.0.0 <4.0.0'\n\n" +
                    'dependencies:\n' +
                    '  flutter:\n' +
                    '    sdk: flutter\n\n' +
                    'dev_dependencies:\n' +
                    '  flutter_test:\n' +
                    '    sdk: flutter\n' +
                    '  flutter_lints: ^5.0.0\n';

                var encoded = btoa(unescape(encodeURIComponent(pubspec)));
                return api('PUT', gp('/contents/apps/' + id + '/pubspec.yaml'), {
                    message: 'feat: scaffold ' + name + ' pubspec',
                    content: encoded
                });
            })
            .then(function() {
                // Step 4: Create minimal main.dart
                var mainDart = "import 'package:flutter/material.dart';\n\n" +
                    'void main() => runApp(const MyApp());\n\n' +
                    'class MyApp extends StatelessWidget {\n' +
                    '  const MyApp({super.key});\n' +
                    '  @override\n' +
                    '  Widget build(BuildContext context) {\n' +
                    '    return MaterialApp(\n' +
                    "      title: '" + name + "',\n" +
                    '      theme: ThemeData.dark(useMaterial3: true),\n' +
                    '      home: Scaffold(\n' +
                    "        appBar: AppBar(title: const Text('" + name + "')),\n" +
                    "        body: const Center(child: Text('" + name + "', style: TextStyle(fontSize: 24))),\n" +
                    '      ),\n' +
                    '    );\n' +
                    '  }\n' +
                    '}\n';

                var encoded = btoa(unescape(encodeURIComponent(mainDart)));
                return api('PUT', gp('/contents/apps/' + id + '/lib/main.dart'), {
                    message: 'feat: scaffold ' + name + ' main.dart',
                    content: encoded
                });
            })
            .then(function() {
                log.innerHTML += '<br><span class="ok">&#10003; App scaffolded</span><br><span class="wait">&#9679; Triggering build...</span>';

                // Step 5: Trigger build
                return api('POST', gp('/actions/workflows/' + wfFile + '/dispatches'), { ref: GH.branch });
            })
            .then(function() {
                log.innerHTML += '<br><span class="ok">&#10003; Build triggered!</span><br><span class="ok"><b>Done. Reload to see card.</b></span>';
                btn.disabled = false;
            })
            .catch(function(err) {
                log.innerHTML += '<br><span class="err">&#10007; ' + err.message + '</span>';
                btn.disabled = false;
            });
        }

        function generateWorkflow(name, id, projName, pkg, tag, emoji) {
            var org = pkg.split('.').slice(0, -1).join('.');
            return 'name: Build ' + name + '\n\n' +
                'on:\n' +
                '  push:\n' +
                '    branches: [main]\n' +
                '    paths:\n' +
                "      - 'apps/" + id + "/**'\n" +
                "      - '.github/workflows/build-" + id + ".yml'\n" +
                '  workflow_dispatch:\n\n' +
                'permissions:\n' +
                '  contents: write\n\n' +
                'jobs:\n' +
                '  build:\n' +
                '    runs-on: ubuntu-latest\n' +
                '    defaults:\n' +
                '      run:\n' +
                '        working-directory: apps/' + id + '\n\n' +
                '    steps:\n' +
                '      - uses: actions/checkout@v4\n\n' +
                '      - name: Setup Java\n' +
                '        uses: actions/setup-java@v4\n' +
                '        with:\n' +
                "          distribution: 'temurin'\n" +
                "          java-version: '17'\n\n" +
                '      - name: Setup Flutter\n' +
                '        uses: subosito/flutter-action@v2\n' +
                '        with:\n' +
                "          flutter-version: '3.24.0'\n" +
                "          channel: 'stable'\n" +
                '          cache: true\n\n' +
                '      - name: Generate Flutter boilerplate\n' +
                '        run: |\n' +
                '          flutter create . --org ' + org + ' --project-name ' + projName + '\n' +
                '          git checkout -- lib/ pubspec.yaml android/app/src/main/AndroidManifest.xml android/app/build.gradle android/settings.gradle android/build.gradle android/gradle.properties 2>/dev/null || true\n\n' +
                '      - name: Clean and build\n' +
                '        run: |\n' +
                '          flutter clean\n' +
                '          flutter pub get\n' +
                '          flutter build apk --debug\n\n' +
                '      - name: Upload APK Artifact\n' +
                '        uses: actions/upload-artifact@v4\n' +
                '        with:\n' +
                '          name: ' + id + '-debug\n' +
                '          path: apps/' + id + '/build/app/outputs/flutter-apk/app-debug.apk\n' +
                '          retention-days: 30\n\n' +
                '      - name: Get version\n' +
                '        id: version\n' +
                '        run: |\n' +
                "          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)\n" +
                '          echo \"version=$VERSION\" >> $GITHUB_OUTPUT\n\n' +
                '      - name: Upload to Release\n' +
                '        uses: softprops/action-gh-release@v1\n' +
                '        with:\n' +
                '          tag_name: ' + tag + '\n' +
                '          name: ' + name + ' (Latest)\n' +
                '          body: |\n' +
                '            ' + emoji + ' ' + name + ' v${{ steps.version.outputs.version }}\n' +
                '            Auto-updated on each successful build.\n' +
                '          files: apps/' + id + '/build/app/outputs/flutter-apk/app-debug.apk\n' +
                '          prerelease: true\n' +
                '        env:\n' +
                '          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n';
        }

        // ── Modal ──
        function openModal(id) {
            document.getElementById(id).classList.add('open');
            if (id === 'newAppModal') populateCategories();
        }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        function populateCategories() {
            var sel = document.getElementById('naCategory');
            if (sel.options.length > 1) return;
            sel.innerHTML = '';
            var cats = config.categories;
            Object.keys(cats).forEach(function(k) {
                if (k === 'all') return;
                var opt = document.createElement('option');
                opt.value = k; opt.textContent = cats[k].label;
                sel.appendChild(opt);
            });
        }

        // ── Token Save ──
        function saveToken() {
            var t = document.getElementById('tokenInput').value.trim();
            if (!t) return;
            var st = document.getElementById('tokenStatus');
            st.innerHTML = '<span class="wait">Verifying...</span>';

            // Test token
            var h = { 'Authorization': 'Bearer ' + t, 'Accept': 'application/vnd.github.v3+json' };
            fetch('https://api.github.com/user', { headers: h })
            .then(function(r) { return r.json(); })
            .then(function(u) {
                if (u.login) {
                    localStorage.setItem(TK, t);
                    st.innerHTML = '<span class="ok">&#10003; Connected as ' + u.login + '</span>';
                    setTimeout(function() {
                        closeModal('tokenModal');
                        renderFactoryBar();
                        // Re-render cards with build buttons enabled
                        renderApps(apps, config.categories);
                        revealCards();
                        loadStatuses();
                    }, 800);
                } else {
                    st.innerHTML = '<span class="err">Invalid token</span>';
                }
            })
            .catch(function(err) {
                st.innerHTML = '<span class="err">' + err.message + '</span>';
            });
        }

        // ── Public API ──
        return {
            triggerBuild: triggerBuild,
            buildAll: buildAll,
            createApp: createApp,
            startPipeline: startPipeline,
            openModal: openModal,
            closeModal: closeModal,
            saveToken: saveToken
        };
    })();
    </script>
</body>
</html>
