name: parksy_studio
description: Parksy Studio — 방송 제작 파이프라인 전체를 하나의 APK 안에
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  path: ^1.9.0
  url_launcher: ^6.2.1
  permission_handler: ^11.3.0
  http: ^1.1.0
  # 트리머 — 네이티브 FFmpeg (H.264 인코딩 포함)
  ffmpeg_kit_flutter_min_gpl: ^6.0.3
  # 트리머 — 영상 미리보기
  video_player: ^2.8.1
  # 동시통역 — Android 네이티브 SpeechRecognizer
  speech_to_text: ^6.6.2
  # 동시통역 — 온디바이스 번역 (ML Kit)
  google_mlkit_translation: ^0.12.0
  # OAuth — Chrome Custom Tab 방식
  flutter_web_auth_2: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/trimmer/
    - assets/interpreter/
    - assets/bgm/
