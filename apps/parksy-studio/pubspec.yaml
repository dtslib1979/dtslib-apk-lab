name: parksy_studio
description: Parksy Studio — 방송 제작 파이프라인 전체를 하나의 APK 안에
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  path: ^1.9.0
  url_launcher: ^6.2.1
  permission_handler: ^11.3.0
  http: ^1.1.0
  # 트리머 — 영상 미리보기
  video_player: ^2.8.1
  # 동시통역 — Android 네이티브 SpeechRecognizer
  speech_to_text: ^6.6.2
  # 동시통역 — 온디바이스 번역 (ML Kit)
  google_mlkit_translation: ^0.13.0
  # 카메라 오버레이 — VirtualDisplay AUTO_MIRROR로 자동 합성
  camera: ^0.10.5+9
  # OAuth 제거 — 업로드는 YouTube 앱 수동으로

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/bgm/
