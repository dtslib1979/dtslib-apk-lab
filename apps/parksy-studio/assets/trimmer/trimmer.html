<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parksy Trimmer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; color: #fff; font-family: sans-serif; padding: 16px; }
  h2 { color: #E8D5B7; margin-bottom: 16px; font-size: 16px; letter-spacing: 1px; }
  video { width: 100%; max-height: 40vh; background: #111; border-radius: 8px; }
  .row { display: flex; gap: 8px; margin: 12px 0; }
  label { color: #aaa; font-size: 12px; display: block; margin-bottom: 4px; }
  input[type=number] { background: #1A1A1A; border: 1px solid #333; color: #fff;
    padding: 8px; border-radius: 6px; width: 100%; font-size: 14px; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: 10px; cursor: pointer;
    font-size: 14px; font-weight: bold; }
  .btn-primary { background: #E8D5B7; color: #000; }
  .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn-danger { background: #333; color: #fff; }
  .status { color: #aaa; font-size: 12px; text-align: center; margin: 8px 0; min-height: 18px; }
  .format-row { display: flex; gap: 8px; margin: 8px 0; }
  .format-btn { flex: 1; padding: 10px; background: #1A1A1A; border: 1px solid #333;
    color: #aaa; border-radius: 8px; cursor: pointer; font-size: 12px; text-align: center; }
  .format-btn.active { border-color: #E8D5B7; color: #E8D5B7; }
  .notice { background: #1A1A1A; border: 1px solid #333; border-radius: 8px;
    padding: 12px; margin: 8px 0; color: #666; font-size: 12px; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
<h2>🎬 영상트리머</h2>

<video id="preview" controls></video>

<div style="margin:12px 0">
  <label>출력 포맷</label>
  <div class="format-row">
    <div class="format-btn active" onclick="setFmt('shorts',this)">📱 Shorts<br>1080×1920</div>
    <div class="format-btn" onclick="setFmt('long',this)">🖥️ Long<br>1920×1080</div>
  </div>
</div>

<div class="row">
  <div style="flex:1">
    <label>크롭 — 위 제거 (px)</label>
    <input type="number" id="cropTop" value="80" min="0">
  </div>
  <div style="flex:1">
    <label>크롭 — 아래 제거 (px)</label>
    <input type="number" id="cropBottom" value="80" min="0">
  </div>
</div>

<div class="notice">
  🚧 변환 기능 준비 중<br>
  v2.0에서 Android MediaCodec 네이티브 엔진으로 구현 예정<br>
  <span style="color:#555">영상 미리보기는 정상 동작합니다</span>
</div>

<div class="status" id="status">영상 경로를 기다리는 중...</div>

<div class="row">
  <button class="btn btn-danger" onclick="reload()">↩ 다시</button>
  <button class="btn btn-primary" id="btnProcess" disabled>🚧 변환 — v2.0 예정</button>
</div>

<script>
let fmt = { id: 'shorts', w: 1080, h: 1920 };
const preview = document.getElementById('preview');
const status = document.getElementById('status');

function setFmt(id, el) {
  document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  fmt = id === 'shorts'
    ? { id: 'shorts', w: 1080, h: 1920 }
    : { id: 'long', w: 1920, h: 1080 };
}

// Flutter JavascriptChannel으로 파일 경로 수신
function receiveVideoPath(path) {
  status.textContent = '영상 로드 중...';
  preview.src = path;
  preview.onloadedmetadata = () => {
    status.textContent = `✅ 로드됨 — ${Math.round(preview.duration)}초 | 미리보기 가능`;
  };
  preview.onerror = () => {
    status.textContent = '⚠️ 영상 로드 실패';
  };
}

function reload() { location.reload(); }

window.addEventListener('load', () => {
  if (window.TrimmerChannel) window.TrimmerChannel.postMessage('ready');
});
</script>
</body>
</html>
